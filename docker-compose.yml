services:
  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=https://laser-cut.pro/api
    depends_on:
      - backend

  backend:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/laser_cut
      - FRONTEND_URL=https://laser-cut.pro
    volumes:
      - images_data:/app/data/images
      - uploads_data:/app/data/uploads
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laser_cut
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  images_data:
  uploads_data:
